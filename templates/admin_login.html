{% extends "base.html" %}
{% block content %}
<section class="card-glass p-4 mx-auto" style="max-width: 520px;">
  <h2 class="h4 text-accent mb-3">Admin sign in</h2>
  <form method="post" novalidate>
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="mb-3">
      <label class="form-label" for="email">Email</label>
      <input id="email" name="email" type="email" class="form-control" value="{{ email }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Password</label>
      <input id="password" name="password" type="password" class="form-control" required>
    </div>
    <button class="btn btn-light w-100" type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
