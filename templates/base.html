<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title or "Vendor Portal" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="container py-4 py-md-5">
    <header class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h4 m-0 text-accent">Vendor Onboarding Portal</h1>
      <nav class="d-flex gap-3">
        <a href="{{ url_for('vendor_form') }}" class="link-nav">Submit Application</a>
        <a href="{{ url_for('admin_list') }}" class="link-nav">View Applications</a>
      </nav>
    </header>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-3">
          {% for category, message in messages %}
            <div class="alert {{ 'alert-success' if category == 'success' else 'alert-danger' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
