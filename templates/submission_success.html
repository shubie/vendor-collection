{% extends "base.html" %}
{% block content %}
<section class="card-glass p-4 p-md-5 mx-auto text-center" style="max-width: 760px;">
  <div class="mb-3" style="font-size: 3rem; line-height: 1;">✅</div>
  <h2 class="h3 text-accent mb-2">Thank you for your submission</h2>
  <p class="text-secondary mb-4">Your vendor application has been received successfully.</p>
  <div class="card-glass p-3 mb-4 mx-auto" style="max-width: 420px;">
    <div class="small text-secondary mb-1">Vendor ID</div>
    <div class="h5 m-0">{{ vendor_identification }}</div>
  </div>
  <div class="d-flex justify-content-center gap-2">
    <a href="{{ url_for('vendor_form') }}" class="btn btn-accent">Submit Another Application</a>

  </div>
</section>
{% endblock %}
